<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/assets/styles/login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Login</title>
</head>

<body>
    <main>
        <div class="container">
            <div class="card p-4 shadow">
                <h1 class="text-center pb-4">Login</h1>
                <div class="row">
                    <div class="column">
                        <form id="form-login" method="post">
                            <div class="mb-3">
                                <input type="text" class="form-control" placeholder="Usuário" name="usuario"
                                    id="usuario" maxlength="12" required>
                            </div>
                            <div class="input-group mb-3">
                                <input type="password" class="form-control" name="senha" id="senha"
                                    maxlength="4" placeholder="Senha" required>
                                <button class="btn btn-light" type="button" id="togglePassword">
                                    <i class="bi bi-eye-slash" id="toggleIcon"></i>
                                </button>
                            </div>
                            <button type="submit" id="btn-entrar" class="btn btn-dark w-100">Entrar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="./src/assets/scripts/login.js"></script>
</body>

</html>
